name: GPU

# Manual only: requires a self-hosted runner with a CUDA GPU registered under the
# `gpu` label. Triggered on demand so it never blocks PRs when no GPU runner exists.
on:
  workflow_dispatch:

jobs:
  test-gpu:
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - name: Install (CUDA torch — adjust the index to your runner's CUDA)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,gpu]'
          # Example for CUDA 13 (e.g. GB10 / DGX Spark). Change cu130 to match the
          # runner's driver (see `nvidia-smi`), or install via an NGC container.
          pip install --index-url https://download.pytorch.org/whl/cu130 torch
      - name: Verify CUDA is usable
        run: |
          python -c "import torch; assert torch.cuda.is_available(); \
          print(torch.__version__, torch.version.cuda, torch.cuda.get_device_capability())"
      - name: Run GPU tests
        run: pytest -m gpu -v
